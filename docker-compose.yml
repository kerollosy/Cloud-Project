services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: resume-extractor
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - model_data:/app/final-resume-model
    depends_on:
      - mongodb
    restart: unless-stopped

  mongodb:
    image: mongo:latest
    container_name: mongodb-local
    ports:
      - "27017:27017"
    env_file:
      - .env
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 1G
        reservations:
          memory: 256M
    volumes:
      - mongodb_data:/data/db
    restart: always

volumes:
  mongodb_data:
  model_data:
